# ==============================================================================
# pi-metaboqc Pipeline Global Configuration File
# Format: YAML
# Description: Controls the global behavior of the pi-metaboqc pipeline for 
# metabolomics data cleaning and analysis.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Core Dataset Construction
# ------------------------------------------------------------------------------
MetaboInt:
  # [String] MS polarity mode. Used for report and output file naming. Options: "POS", "NEG"
  mode: "POS"
  
  # [String] Column name mapping matching your metadata CSV
  sample_name: "Sample Name"    # Unique sample ID column
  sample_type: "Sample Type"    # Sample type column
  bio_group: "Bio Group"        # Biological/clinical group column
  batch: "Batch"                # Analytical batch column
  inject_order: "Inject Order"  # Injection sequence column
  
  # [Dict] Dictionary mapping user-defined sample types to pipeline standards.
  # Must strictly contain "Actual sample", "Blank sample", and "QC sample" keys.
  sample_dict:
    "Actual sample": "Sample"
    "Blank sample": "Blank"
    "QC sample": "QC"
    
  # [List] List of internal isotope standards (feature IDs).
  # Used for Shewhart control charts and abnormal sample flagging.
  internal_standard: 
    - "Phenylalanine-d5"
    - "choline-d4"
    - "CA-d4"
    - "CDCA-d4"
    - "cannitine C10:0-d3"
    - "FFA 18:0-d3"
    - "FFA 16:0-d3"
    - "IS-PC"
    - "IS-TG"
    - "IS-CER"
    - "IS-SM"
    - "IS-PE"
    - "IS-LPC"
    - "IS_PC 38:0+AcO"
    - "IS_PE 30:0-H"
    - "IS_LPC 19:0+AcO"
    - "IS_SM 30:1;2+AcO"
    - "IS_FFA C16:0-d3"
    - "IS_FFA C18:0-d3"
    
  # [List] List of known outlier markers (reserved interface).
  outlier_marker: []


# ------------------------------------------------------------------------------
# 2. Invalid Feature & Sample Filtering
# ------------------------------------------------------------------------------
MetaboIntFLTR:
  # [Float] Rule 1: Global MV Tolerance. Features exceeding this missing ratio are dropped. Range: 0.0 - 1.0
  mv_global_tol: 0.7
  
  # [Float] Rule 2: Group MV Tolerance. Features below this missing ratio in ANY single group are retained. Range: 0.0 - 1.0
  mv_group_tol: 0.5
  
  # [Float] Rule 3: QC MV Tolerance. Features exceeding this missing ratio in Pooled QC are dropped. Range: 0.0 - 1.0
  mv_qc_tol: 0.8
  
  # [Float] Rule 4: QC RSD Tolerance. Features exceeding this RSD in Pooled QC are dropped. Range: 0.0 - 1.0
  rsd_qc_tol: 0.7
  
  # [Float] Rule 5: QC/Blank Ratio Limit. QC mean must reach this multiple of Blank mean (Blank=0 automatically retained). Range: > 0.0
  qc_blank_ratio: 5.0
  
  # [Float] Sample Warning: Samples exceeding this missing feature ratio will be flagged (not forcefully dropped). Range: 0.0 - 1.0
  sample_mv_tol: 0.5


# ------------------------------------------------------------------------------
# 3. Signal Correction & Batch Effect
# ------------------------------------------------------------------------------
MetaboIntSC:
  # [String] Baseline fitting estimator. Options: "QC-RLSC" (LOESS), "QC-RFSC" (Random Forest), "QC-SVR" (SVR)
  base_est: "QC-RFSC"
  
  # [Float] Window span parameter for LOESS smoothing. Range: 0.0 - 1.0
  span: 0.3
  
  # [Int] Number of decision trees for Random Forest regression. Range: > 0
  n_tree: 500
  
  # [Int] Random seed ensuring model reproducibility during multi-threading/testing.
  random_state: 12345
  
  # [String] Kernel function type for Support Vector Regression. Options: "linear", "poly", "rbf", "sigmoid"
  svr_kernel: "rbf"
  
  # [Float] Regularization penalty parameter (C) for SVR. Range: > 0.0
  svr_c: 1.0
  
  # [String/Float] Kernel coefficient for SVR. Options: "scale", "auto", or float > 0.0
  svr_gamma: "scale"


# ------------------------------------------------------------------------------
# 4. Quality Assessment
# ------------------------------------------------------------------------------
MetaboIntQA:
  # [String] Method for computing QC samples correlation matrix. Options: "spearman", "pearson"
  corr_method: "spearman"
  
  # [Boolean] Apply upper-triangle mask to correlation heatmaps for a cleaner view. Options: true, false
  mask: true
  
  # [String] Boundary calculation method for Shewhart IS control charts. Also applied to IS outlier reporting. Options: "IQR", "sigma"
  boundary: "IQR"
  
  # [String] Statistical criteria for defining PCA outlier samples. Options: "HT2", "SPE-DModX", "All"
  stat_outlier: "All"


# ------------------------------------------------------------------------------
# 5. Data Normalization
# ------------------------------------------------------------------------------
MetaboIntNorm:
  # [String] Sample-wise (Column) normalization to eliminate systematic errors. Options: "PQN", "TIC", "Median", "None"
  col_norm: "PQN"
  
  # [String] Feature-wise (Row) scaling to stabilize heteroscedasticity. Options: "VSN", "Auto", "Pareto", "None"
  row_norm: "VSN"
  
  # [Boolean] Enable standalone Quantile Normalization. Overrides col/row settings if true. Options: true, false
  quantile_norm: false